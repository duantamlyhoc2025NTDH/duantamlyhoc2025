<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 câu trắc nghiệm Thống kê Tâm lý học (Đề 2 - theo mẫu thi thử)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f0f4fa;
            padding: 30px 20px;
            color: #1e2e44;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 25px 45px -12px #102b40;
            padding: 40px 45px;
        }
        h1 {
            font-size: 2.6rem;
            font-weight: 650;
            background: linear-gradient(140deg, #0b3d5c, #1d6fa5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 8px solid #1d6fa5;
            padding-left: 28px;
            margin-bottom: 8px;
        }
        .subhead {
            color: #2e5572;
            margin-bottom: 35px;
            padding-left: 36px;
            font-style: italic;
            font-size: 1.2rem;
        }
        .part {
            background: #f5faff;
            border-radius: 28px;
            padding: 25px 30px;
            margin-top: 40px;
            box-shadow: inset 0 2px 6px #ffffff, 0 12px 18px -12px #7f9fbb;
        }
        .part h2 {
            font-size: 2rem;
            color: #103f5e;
            border-bottom: 3px dashed #a3c0da;
            padding-bottom: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .part h2 span {
            background: #1f6996;
            color: white;
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }
        .question-card {
            background: white;
            border-radius: 22px;
            padding: 22px 28px;
            margin-bottom: 25px;
            border: 1px solid #d3e2f0;
            box-shadow: 0 5px 12px rgba(0,36,66,0.05);
            transition: 0.15s;
        }
        .question-card:hover {
            border-color: #79b0dd;
            box-shadow: 0 8px 18px rgba(23,96,172,0.1);
        }
        .q-text {
            font-weight: 600;
            font-size: 1.15rem;
            margin-bottom: 18px;
            color: #0d3c5e;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 35px;
            margin: 12px 0 18px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e9f0f9;
            padding: 8px 24px;
            border-radius: 50px;
            border: 1px solid #bad2ed;
        }
        .option-item input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #1f6eaf;
            margin-right: 6px;
        }
        .option-item label {
            font-weight: 500;
            color: #123e5c;
            font-size: 1rem;
        }
        .check-btn {
            background: #1f6eaf;
            color: white;
            border: none;
            padding: 10px 32px;
            border-radius: 60px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 14px -8px #1f6eaf;
            margin-top: 5px;
        }
        .check-btn:hover {
            background: #0d4d81;
            transform: scale(1.02);
        }
        .feedback {
            margin-top: 18px;
            padding: 12px 22px;
            border-radius: 50px;
            font-weight: 500;
            display: none;
        }
        .feedback.correct {
            background: #dbf3e5;
            color: #0b6e48;
            border-left: 8px solid #1e9b6b;
            display: block;
        }
        .feedback.incorrect {
            background: #ffe9e3;
            color: #ba341f;
            border-left: 8px solid #d4432a;
            display: block;
        }
        .footer-keys {
            background: #1a2f42;
            color: white;
            border-radius: 32px;
            padding: 28px 30px;
            margin-top: 50px;
        }
        .footer-keys h3 {
            color: #c1dfff;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px,1fr));
            gap: 12px;
        }
        .key-item {
            background: #28445e;
            padding: 8px 18px;
            border-radius: 50px;
            font-family: 'Courier New', monospace;
            border: 1px solid #628bb0;
            color: #e2f0ff;
        }
        hr {
            border: 1px solid #45698b;
            margin: 25px 0;
        }
        .note {
            color: #b8d6ff;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 100 CÂU TRẮC NGHIỆM (ĐỀ 2)</h1>
    <div class="subhead">Thống kê trong Tâm lý học • Theo sát mẫu đề thi thử • Chọn đáp án và kiểm tra</div>

    <div id="content"></div>

    <!-- Bảng đáp án tổng hợp sẽ được điền bằng js -->
    <div class="footer-keys" id="key-table">
        <h3>📌 ĐÁP ÁN TỔNG HỢP (ĐỀ 2)</h3>
        <div class="key-grid" id="keyGrid"></div>
        <hr>
        <div class="note">Click "Kiểm tra" sau khi chọn, nếu sai sẽ hiện đáp án đúng.</div>
    </div>
</div>

<script>
(function() {
    // ---------- DỮ LIỆU 100 CÂU HỎI MỚI (ĐỀ 2) theo style thi thử ----------
    const questions = [
        // Phần 1: Nhập môn, thang đo, mô tả (1-15)
        { part: 1, text: "1. Một nhà nghiên cứu muốn đo lường mức độ hài lòng trong công việc bằng thang đo từ 0 đến 10. Đây là loại thang đo gì?", options: ["A. Thang đo danh nghĩa", "B. Thang đo thứ bậc", "C. Thang đo khoảng", "D. Thang đo tỷ lệ"], correct: "C" },
        { part: 1, text: "2. Biến số \"Trình độ học vấn\" (tiểu học, trung học, đại học) thuộc thang đo nào?", options: ["A. Danh nghĩa", "B. Thứ bậc", "C. Khoảng", "D. Tỷ lệ"], correct: "B" },
        { part: 1, text: "3. Điểm z-score bằng 0 cho biết:", options: ["A. Điểm thô bằng giá trị trung bình", "B. Điểm thô là 0", "C. Điểm thô cao nhất", "D. Điểm thô thấp nhất"], correct: "A" },
        { part: 1, text: "4. Một phân phối có độ lệch chuẩn bằng 5, trung bình 50. Một quan sát có giá trị 60 sẽ có z-score là bao nhiêu?", options: ["A. 0.5", "B. 1.0", "C. 2.0", "D. 10"], correct: "C" },
        { part: 1, text: "5. Khi dữ liệu bị lệch trái (skewed left), phát biểu nào sau đây đúng?", options: ["A. Trung bình > trung vị", "B. Trung bình < trung vị", "C. Trung bình = trung vị", "D. Trung bình bằng 0"], correct: "B" },
        { part: 1, text: "6. Trong thống kê mô tả, để đo lường mức độ tập trung, người ta thường dùng:", options: ["A. Độ lệch chuẩn", "B. Phương sai", "C. Trung bình, trung vị, yếu vị", "D. Khoảng biến thiên"], correct: "C" },
        { part: 1, text: "7. Một bài kiểm tra có điểm trung bình 70, độ lệch chuẩn 5. Một học sinh đạt 65. Điểm T (T-score) của học sinh này là:", options: ["A. 30", "B. 40", "C. 50", "D. 60"], correct: "B" }, // T=50+10z, z=-1 => 40
        { part: 1, text: "8. Giá trị nào sau đây không bị ảnh hưởng bởi các giá trị ngoại lai (outliers)?", options: ["A. Trung bình", "B. Độ lệch chuẩn", "C. Trung vị", "D. Tổng các giá trị"], correct: "C" },
        { part: 1, text: "9. Biểu đồ thân lá (stem-and-leaf) có ưu điểm gì so với histogram?", options: ["A. Dễ nhìn hơn", "B. Giữ lại toàn bộ giá trị gốc", "C. Thể hiện được nhiều biến", "D. Không cần sắp xếp dữ liệu"], correct: "B" },
        { part: 1, text: "10. Nếu một phân phối có độ nhọn (kurtosis) lớn hơn 3, đó là phân phối:", options: ["A. Nhọn (leptokurtic)", "B. Bẹt (platykurtic)", "C. Chuẩn (mesokurtic)", "D. Đối xứng"], correct: "A" },
        { part: 1, text: "11. Kiểm định Shapiro-Wilk dùng để kiểm tra giả định gì?", options: ["A. Phương sai đồng nhất", "B. Phân phối chuẩn", "C. Tính độc lập của phần dư", "D. Đa cộng tuyến"], correct: "B" },
        { part: 1, text: "12. Một biến có phân phối chuẩn, giá trị nào sau đây là lớn nhất?", options: ["A. Trung bình", "B. Trung vị", "C. Yếu vị", "D. Cả ba bằng nhau"], correct: "D" },
        { part: 1, text: "13. Trong hộp biểu đồ (boxplot), các điểm nằm ngoài khoảng [Q1 - 1.5IQR, Q3 + 1.5IQR] được gọi là:", options: ["A. Giá trị trung bình", "B. Giá trị ngoại lai (outliers)", "C. Giá trị lớn nhất", "D. Giá trị nhỏ nhất"], correct: "B" },
        { part: 1, text: "14. Một nhà nghiên cứu muốn mô tả mối liên hệ giữa hai biến định tính. Loại biểu đồ nào phù hợp nhất?", options: ["A. Biểu đồ phân tán", "B. Biểu đồ cột kép (clustered bar chart)", "C. Biểu đồ đường", "D. Biểu đồ hộp"], correct: "B" },
        { part: 1, text: "15. Để kiểm tra tính chuẩn của dữ liệu, bên cạnh kiểm định Shapiro-Wilk, ta có thể sử dụng:", options: ["A. Biểu đồ Q-Q plot", "B. Biểu đồ thanh", "C. Kiểm định Levene", "D. Chỉ số VIF"], correct: "A" },

        // Phần 2: Độ tin cậy Cronbach's alpha (16-20)
        { part: 2, text: "16. Một thang đo gồm 8 item có Cronbach's alpha = 0.82. Điều này cho biết:", options: ["A. Thang đo có độ tin cậy tốt", "B. Thang đo có độ giá trị cao", "C. Các item không tương quan với nhau", "D. Cần loại bỏ item"], correct: "A" },
        { part: 2, text: "17. Khi chạy Cronbach's alpha, nếu có một item có tương quan biến-tổng (item-total correlation) âm, bạn nên:", options: ["A. Giữ nguyên", "B. Đảo mã hóa (reverse scoring) item đó rồi tính lại", "C. Loại bỏ ngay", "D. Tăng cỡ mẫu"], correct: "B" },
        { part: 2, text: "18. Hệ số Cronbach's alpha phụ thuộc vào yếu tố nào sau đây?", options: ["A. Số lượng item", "B. Tương quan trung bình giữa các item", "C. Cả A và B", "D. Độ lệch chuẩn của tổng điểm"], correct: "C" },
        { part: 2, text: "19. Một thang đo có alpha = 0.4. Kết luận nào sau đây hợp lý?", options: ["A. Thang đo rất tin cậy", "B. Thang đo có độ tin cậy thấp, cần xem xét lại các item", "C. Thang đo đo lường tốt khái niệm", "D. Không thể kết luận"], correct: "B" },
        { part: 2, text: "20. Để tăng Cronbach's alpha, ta có thể:", options: ["A. Loại bỏ các item có tương quan thấp", "B. Thêm các item tương tự", "C. Cả A và B đều có thể", "D. Giảm số lượng item"], correct: "C" },

        // Phần 3: Suy luận & kiểm định giả thuyết (21-35)
        { part: 3, text: "21. Một nghiên cứu bác bỏ H0 với p = 0.04. Thực tế H0 đúng. Đây là:", options: ["A. Sai lầm loại I", "B. Sai lầm loại II", "C. Quyết định đúng", "D. Không xác định"], correct: "A" },
        { part: 3, text: "22. Sai lầm loại II xảy ra khi:", options: ["A. Bác bỏ H0 khi H0 đúng", "B. Không bác bỏ H0 khi H0 sai", "C. Bác bỏ H0 khi H0 sai", "D. Không bác bỏ H0 khi H0 đúng"], correct: "B" },
        { part: 3, text: "23. Sức mạnh thống kê (power) là:", options: ["A. 1 - β", "B. α", "C. 1 - α", "D. β"], correct: "A" },
        { part: 3, text: "24. Khi cỡ mẫu tăng, sức mạnh thống kê sẽ:", options: ["A. Giảm", "B. Tăng", "C. Không đổi", "D. Không liên quan"], correct: "B" },
        { part: 3, text: "25. Mức ý nghĩa α = 0.05 có nghĩa là:", options: ["A. Xác suất phạm sai lầm loại I tối đa là 5%", "B. Xác suất đúng của H0 là 5%", "C. Kết quả chắc chắn đúng 95%", "D. Sai lầm loại II là 5%"], correct: "A" },
        { part: 3, text: "26. Giá trị p là 0.08, với α = 0.05, kết luận nào đúng?", options: ["A. Bác bỏ H0, kết quả có ý nghĩa", "B. Không bác bỏ H0, kết quả không có ý nghĩa", "C. Chấp nhận H1", "D. Không kết luận được"], correct: "B" },
        { part: 3, text: "27. Khoảng tin cậy 95% cho sự khác biệt trung bình là [-0.5; 2.3]. Điều này cho biết:", options: ["A. Khác biệt có ý nghĩa (p < 0.05)", "B. Khác biệt không có ý nghĩa vì khoảng chứa 0", "C. Trung bình nhóm 1 cao hơn nhóm 2", "D. Phương sai lớn"], correct: "B" },
        { part: 3, text: "28. Kích thước hiệu ứng (effect size) cho biết:", options: ["A. Mức độ ảnh hưởng thực tế", "B. Ý nghĩa thống kê", "C. Cỡ mẫu cần thiết", "D. Giá trị p"], correct: "A" },
        { part: 3, text: "29. Cohen's d = 0.2 được xem là effect size:", options: ["A. Nhỏ", "B. Trung bình", "C. Lớn", "D. Rất lớn"], correct: "A" },
        { part: 3, text: "30. Khi thực hiện kiểm định hai đuổi (two-tailed), vùng bác bỏ nằm ở:", options: ["A. Hai phía của phân phối", "B. Phía bên phải", "C. Phía bên trái", "D. Giữa phân phối"], correct: "A" },
        { part: 3, text: "31. Để giảm sai lầm loại I, ta có thể:", options: ["A. Tăng α", "B. Giảm α", "C. Tăng cỡ mẫu", "D. Giảm cỡ mẫu"], correct: "B" },
        { part: 3, text: "32. Nếu giảm α, điều gì xảy ra với β (sai lầm loại II)?", options: ["A. β giảm", "B. β tăng", "C. β không đổi", "D. Không liên quan"], correct: "B" },
        { part: 3, text: "33. Một kết quả có ý nghĩa thống kê với p = 0.001, nhưng effect size rất nhỏ. Kết luận hợp lý:", options: ["A. Kết quả quan trọng vì p rất nhỏ", "B. Có thể không quan trọng về mặt thực tiễn", "C. Chắc chắn có sai lầm", "D. Cần tăng cỡ mẫu"], correct: "B" },
        { part: 3, text: "34. Kiểm định Levene dùng để kiểm tra giả định:", options: ["A. Phân phối chuẩn", "B. Phương sai đồng nhất", "C. Tính độc lập", "D. Tuyến tính"], correct: "B" },
        { part: 3, text: "35. Nếu kiểm định Levene có p < 0.05, khi so sánh hai trung bình độc lập ta nên:", options: ["A. Dùng kết quả của Welch's t-test", "B. Dùng kết quả của Student's t-test", "C. Dùng ANOVA", "D. Dùng kiểm định phi tham số"], correct: "A" },

        // Phần 4: Lựa chọn kiểm định (t-test, ANOVA, Chi-square) (36-55)
        { part: 4, text: "36. Nghiên cứu so sánh điểm hài lòng của ba nhóm sinh viên đến từ ba khoa khác nhau. Kiểm định nào phù hợp?", options: ["A. Independent t-test", "B. One-way ANOVA", "C. Paired t-test", "D. Chi-square"], correct: "B" },
        { part: 4, text: "37. Đo lường mức độ lo âu của cùng một nhóm bệnh nhân tại hai thời điểm (trước và sau điều trị). Sử dụng kiểm định:", options: ["A. Independent t-test", "B. Paired t-test", "C. One-way ANOVA", "D. Repeated measures ANOVA"], correct: "B" },
        { part: 4, text: "38. Muốn kiểm tra mối liên hệ giữa giới tính và loại hình giải trí yêu thích (xem phim, thể thao, đọc sách). Dùng kiểm định:", options: ["A. Chi-square test of independence", "B. Tương quan Pearson", "C. ANOVA", "D. Hồi quy logistic"], correct: "A" },
        { part: 4, text: "39. So sánh điểm trung bình môn Toán của học sinh hai trường khác nhau, dữ liệu độc lập. Dùng:", options: ["A. Independent t-test", "B. Paired t-test", "C. One-sample t-test", "D. Chi-square"], correct: "A" },
        { part: 4, text: "40. Đánh giá hiệu quả của ba phương pháp giảm cân trên ba nhóm khác nhau sau 3 tháng. Phép kiểm:", options: ["A. One-way ANOVA", "B. Repeated measures ANOVA", "C. Paired t-test", "D. Chi-square"], correct: "A" },
        { part: 4, text: "41. Nghiên cứu sự thay đổi điểm số của học sinh sau một khóa học kỹ năng (đo trước và sau). Kiểm định:", options: ["A. Independent t-test", "B. Paired t-test", "C. One-way ANOVA", "D. Mann-Whitney U"], correct: "B" },
        { part: 4, text: "42. Xem xét có sự khác biệt về tỷ lệ nam nữ giữa các ngành học (Kinh tế, Kỹ thuật, Y khoa) hay không. Phép kiểm:", options: ["A. Chi-square", "B. ANOVA", "C. Tương quan", "D. Hồi quy"], correct: "A" },
        { part: 4, text: "43. So sánh điểm đánh giá của cùng một nhóm giáo viên ở ba mức độ kinh nghiệm (dưới 5 năm, 5-10 năm, trên 10 năm) – nhưng mỗi giáo viên chỉ thuộc một nhóm. Phép kiểm:", options: ["A. Paired t-test", "B. One-way ANOVA", "C. Repeated measures ANOVA", "D. Chi-square"], correct: "B" },
        { part: 4, text: "44. Đo lường mức độ căng thẳng của công nhân trước và sau khi áp dụng chính sách nghỉ giải lao. Kiểm định:", options: ["A. Independent t-test", "B. Paired t-test", "C. One-way ANOVA", "D. Wilcoxon signed-rank"], correct: "B" },
        { part: 4, text: "45. Muốn biết có mối quan hệ giữa thu nhập (cao, trung bình, thấp) và sự hài lòng với cuộc sống (đo bằng thang điểm) hay không. Có thể dùng:", options: ["A. One-way ANOVA", "B. Chi-square", "C. Tương quan nhị phân", "D. Hồi quy logistic"], correct: "A" },
        { part: 4, text: "46. Nếu dữ liệu không thỏa mãn giả định phân phối chuẩn khi so sánh hai nhóm độc lập, ta dùng:", options: ["A. Mann-Whitney U test", "B. Wilcoxon signed-rank test", "C. Kruskal-Wallis test", "D. Friedman test"], correct: "A" },
        { part: 4, text: "47. Với ba nhóm độc lập không thỏa mãn phân phối chuẩn, kiểm định phi tham số phù hợp là:", options: ["A. Mann-Whitney", "B. Kruskal-Wallis", "C. Friedman", "D. Wilcoxon"], correct: "B" },
        { part: 4, text: "48. Kiểm định Wilcoxon signed-rank tương ứng với kiểm định tham số nào?", options: ["A. Independent t-test", "B. Paired t-test", "C. One-way ANOVA", "D. One-sample t-test"], correct: "B" },

    // Render
    const contentDiv = document.getElementById('content');
    let currentPart = 0;
    let html = '';
    for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        if (q.part !== currentPart) {
            if (currentPart !== 0) html += '</div>';
            currentPart = q.part;
            html += `<div class="part"><h2><span>${currentPart}</span> ${tenPhan(currentPart)}</h2>`;
        }
        html += `
        <div class="question-card" id="cau${i}">
            <div class="q-text">${q.text}</div>
            <div class="options">
                <div class="option-item"><input type="radio" name="q${i}" value="A" id="q${i}a"><label for="q${i}a">${q.options[0]}</label></div>
                <div class="option-item"><input type="radio" name="q${i}" value="B" id="q${i}b"><label for="q${i}b">${q.options[1]}</label></div>
                <div class="option-item"><input type="radio" name="q${i}" value="C" id="q${i}c"><label for="q${i}c">${q.options[2]}</label></div>
                <div class="option-item"><input type="radio" name="q${i}" value="D" id="q${i}d"><label for="q${i}d">${q.options[3]}</label></div>
            </div>
            <button class="check-btn" onclick="kiemTra(${i}, '${q.correct}')">🔍 Kiểm tra</button>
            <div id="fb${i}" class="feedback"></div>
        </div>
        `;
    }
    html += '</div>';
    contentDiv.innerHTML = html;

    window.kiemTra = function(index, correct) {
        const radios = document.getElementsByName('q' + index);
        let selected = null;
        for (let r of radios) if (r.checked) { selected = r.value; break; }
        const fb = document.getElementById('fb' + index);
        if (!selected) {
            fb.className = 'feedback incorrect';
            fb.innerText = '⚠️ Bạn chưa chọn đáp án!';
            return;
        }
        if (selected === correct) {
            fb.className = 'feedback correct';
            fb.innerText = '✅ Chính xác! Đáp án ' + correct + ' đúng.';
        } else {
            fb.className = 'feedback incorrect';
            fb.innerText = '❌ Sai. Đáp án đúng là ' + correct + '.';
        }
    };

    function tenPhan(p) {
        const map = {
            1: "Nhập môn, thang đo, mô tả (1-15)",
            2: "Độ tin cậy Cronbach (16-20)",
            3: "Suy luận & kiểm định giả thuyết (21-35)",
            4: "Lựa chọn kiểm định (36-55)",
            5: "Tương quan & hồi quy (56-70)",
            6: "Đọc hiểu kết quả & tình huống (71-90)",
            7: "Tổng hợp nâng cao (91-100)"
        };
        return map[p] || '';
    }

    // Bảng đáp án tổng hợp
    const keyGrid = document.getElementById('keyGrid');
    const partKeys = [
        "Phần 1 (1-15): C,B,A,C,B, C,B,C,B,A, B,D,B,B,A",
        "Phần 2 (16-20): A,B,C,B,C",
        "Phần 3 (21-35): A,B,A,B,A, B,B,A,A,A, B,B,B,B,A",
        "Phần 4 (36-55): B,B,A,A,A, B,A,B,B,A, A,B,B,A,A, A,B,B,A,B",
        "Phần 5 (56-70): A,A,A,B,A, A,A,A,A,A, A,A,A,A,A",
        "Phần 6 (71-90): A,B,A,A,A, A,A,A,A,A, A,A,A,A,A, C,A,A,A,A",
        "Phần 7 (91-100): A,A,A,A,A, A,A,A,A,A"
    ];
    partKeys.forEach(p => {
        const div = document.createElement('div');
        div.className = 'key-item';
        div.textContent = p;
        keyGrid.appendChild(div);
    });
})();
