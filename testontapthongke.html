<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 câu trắc nghiệm Thống kê Tâm lý học</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #eef2f7;
            padding: 30px 20px;
            color: #1e2e44;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 25px 45px -12px #102b40;
            padding: 40px 45px;
        }
        h1 {
            font-size: 2.6rem;
            font-weight: 650;
            background: linear-gradient(140deg, #0b3d5c, #1d6fa5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 8px solid #1d6fa5;
            padding-left: 28px;
            margin-bottom: 8px;
        }
        .subhead {
            color: #2e5572;
            margin-bottom: 35px;
            padding-left: 36px;
            font-style: italic;
            font-size: 1.2rem;
        }
        .part {
            background: #f5faff;
            border-radius: 28px;
            padding: 25px 30px;
            margin-top: 40px;
            box-shadow: inset 0 2px 6px #ffffff, 0 12px 18px -12px #7f9fbb;
        }
        .part h2 {
            font-size: 2rem;
            color: #103f5e;
            border-bottom: 3px dashed #a3c0da;
            padding-bottom: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .part h2 span {
            background: #1f6996;
            color: white;
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }
        .question-card {
            background: white;
            border-radius: 22px;
            padding: 22px 28px;
            margin-bottom: 25px;
            border: 1px solid #d3e2f0;
            box-shadow: 0 5px 12px rgba(0,36,66,0.05);
            transition: 0.15s;
        }
        .question-card:hover {
            border-color: #79b0dd;
            box-shadow: 0 8px 18px rgba(23,96,172,0.1);
        }
        .q-text {
            font-weight: 600;
            font-size: 1.15rem;
            margin-bottom: 18px;
            color: #0d3c5e;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 35px;
            margin: 12px 0 18px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e9f0f9;
            padding: 8px 24px;
            border-radius: 50px;
            border: 1px solid #bad2ed;
        }
        .option-item input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #1f6eaf;
            margin-right: 6px;
        }
        .option-item label {
            font-weight: 500;
            color: #123e5c;
            font-size: 1rem;
        }
        .check-btn {
            background: #1f6eaf;
            color: white;
            border: none;
            padding: 10px 32px;
            border-radius: 60px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 14px -8px #1f6eaf;
            margin-top: 5px;
        }
        .check-btn:hover {
            background: #0d4d81;
            transform: scale(1.02);
        }
        .feedback {
            margin-top: 18px;
            padding: 12px 22px;
            border-radius: 50px;
            font-weight: 500;
            display: none;
        }
        .feedback.correct {
            background: #dbf3e5;
            color: #0b6e48;
            border-left: 8px solid #1e9b6b;
            display: block;
        }
        .feedback.incorrect {
            background: #ffe9e3;
            color: #ba341f;
            border-left: 8px solid #d4432a;
            display: block;
        }
        .footer-keys {
            background: #1a2f42;
            color: white;
            border-radius: 32px;
            padding: 28px 30px;
            margin-top: 50px;
        }
        .footer-keys h3 {
            color: #c1dfff;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .key-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px,1fr));
            gap: 12px;
        }
        .key-item {
            background: #28445e;
            padding: 8px 18px;
            border-radius: 50px;
            font-family: 'Courier New', monospace;
            border: 1px solid #628bb0;
            color: #e2f0ff;
        }
        hr {
            border: 1px solid #45698b;
            margin: 25px 0;
        }
        .note {
            color: #b8d6ff;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 100 CÂU TRẮC NGHIỆM</h1>
    <div class="subhead">Thống kê trong Tâm lý học • 7 phần • Chọn đáp án và kiểm tra ngay</div>

    <div id="content"></div>

    <!-- Bảng đáp án tổng hợp sẽ được điền bằng js -->
    <div class="footer-keys" id="key-table">
        <h3>📌 ĐÁP ÁN TỔNG HỢP</h3>
        <div class="key-grid" id="keyGrid"></div>
        <hr>
        <div class="note">Click "Kiểm tra" sau khi chọn, nếu sai sẽ hiện đáp án đúng.</div>
    </div>
</div>

<script>
(function() {
    // ---------- DỮ LIỆU 100 CÂU HỎI (theo đáp án từ bộ đề) ----------
    const questions = [
        // Phần 1: Nhập môn, thang đo & thống kê mô tả (1-20)
        { part: 1, text: "1. Trong nghiên cứu tâm lý, biến \"Giới tính\" (Nam/Nữ) được đo lường bằng thang đo nào?", options: ["A. Thang đo khoảng (Interval)", "B. Thang đo tỷ lệ (Ratio)", "C. Thang đo danh nghĩa (Nominal)", "D. Thang đo thứ bậc (Ordinal)"], correct: "C" },
        { part: 1, text: "2. Điểm số của một bài test trí thông minh (IQ) được cho là thuộc thang đo khoảng vì:", options: ["A. Nó có điểm 0 tuyệt đối.", "B. Có thể xếp hạng thứ tự nhưng khoảng cách giữa các điểm không bằng nhau.", "C. Khoảng cách giữa các điểm số là bằng nhau nhưng không có điểm 0 tuyệt đối.", "D. Nó chỉ dùng để phân loại đối tượng."], correct: "C" },
        { part: 1, text: "3. Một nhà nghiên cứu muốn đo lường mức độ đồng ý của sinh viên về một phát biểu với các lựa chọn: \"Rất không đồng ý\", \"Không đồng ý\", \"Trung lập\", \"Đồng ý\", \"Rất đồng ý\". Dữ liệu thu được thuộc loại thang đo gì?", options: ["A. Danh nghĩa", "B. Thứ bậc", "C. Khoảng", "D. Tỷ lệ"], correct: "B" },
        { part: 1, text: "4. Số liệu thống kê (statistic) và tham số (parameter) khác nhau như thế nào?", options: ["A. Thống kê được tính từ tổng thể, tham số được tính từ mẫu.", "B. Thống kê được tính từ mẫu, tham số được tính từ tổng thể.", "C. Thống kê là giá trị cố định, tham số là giá trị ước lượng.", "D. Không có gì khác nhau."], correct: "B" },
        { part: 1, text: "5. Một nghiên cứu đo chiều cao của 100 sinh viên được chọn ngẫu nhiên từ một trường đại học và tính được chiều cao trung bình là 165 cm. \"165 cm\" ở đây được gọi là:", options: ["A. Tham số", "B. Thống kê", "C. Hằng số", "D. Giá trị lý thuyết"], correct: "B" },
        { part: 1, text: "6. Để đo lường mức độ phân tán của dữ liệu xung quanh giá trị trung bình, người ta thường dùng chỉ số nào nhất?", options: ["A. Số trung vị", "B. Độ lệch chuẩn", "C. Số yếu vị", "D. Độ nhọn"], correct: "B" },
        { part: 1, text: "7. Một phân phối có đuôi dài về bên phải, giá trị trung bình lớn hơn số trung vị. Đây là phân phối:", options: ["A. Đối xứng", "B. Lệch trái (Lệch âm)", "C. Lệch phải (Lệch dương)", "D. Nhọn bất thường"], correct: "C" },
        { part: 1, text: "8. Một người có điểm Z = -2 trong bài kiểm tra trầm cảm. Điều này có nghĩa là:", options: ["A. Điểm số của họ cao hơn điểm trung bình 2 độ lệch chuẩn.", "B. Điểm số của họ thấp hơn điểm trung bình 2 độ lệch chuẩn.", "C. Họ có điểm số bằng -2.", "D. 2% người có điểm số thấp hơn họ."], correct: "B" },
        { part: 1, text: "9. Trong phân phối chuẩn, khoảng bao nhiêu phần trăm số quan sát nằm trong khoảng từ -1 đến +1 độ lệch chuẩn so với trung bình?", options: ["A. 68%", "B. 95%", "C. 99%", "D. 50%"], correct: "A" },
        { part: 1, text: "10. Kết quả kiểm định Shapiro-Wilk cho một biến có p = 0.02. Với mức ý nghĩa α = 0.05, ta kết luận gì?", options: ["A. Dữ liệu có phân phối chuẩn.", "B. Dữ liệu không có phân phối chuẩn.", "C. Dữ liệu có phương sai đồng nhất.", "D. Dữ liệu không có điểm dị biệt."], correct: "B" },
        { part: 1, text: "11. Trong Jamovi, biểu đồ nào hữu ích nhất để phát hiện các điểm dị biệt (outliers)?", options: ["A. Histogram", "B. Biểu đồ thân lá", "C. Biểu đồ hộp (Boxplot)", "D. Biểu đồ thanh"], correct: "C" },
        { part: 1, text: "12. Một bộ dữ liệu có độ lệch chuẩn bằng 0. Điều đó cho biết:", options: ["A. Tất cả các giá trị trong bộ dữ liệu đều bằng nhau.", "B. Giá trị trung bình bằng 0.", "C. Dữ liệu phân tán rất rộng.", "D. Có một nửa giá trị âm, một nửa giá trị dương."], correct: "A" },
        { part: 1, text: "13. Độ nhọn (Kurtosis) của một phân phối chuẩn có giá trị xấp xỉ bằng bao nhiêu?", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct: "D" },
        { part: 1, text: "14. Khi báo cáo kết quả thống kê mô tả theo APA, thông tin nào sau đây là quan trọng nhất cần được trình bày?", options: ["A. Giá trị lớn nhất và nhỏ nhất.", "B. Giá trị trung bình (M) và độ lệch chuẩn (SD).", "C. Số lượng mẫu (N) và giá trị p.", "D. Hệ số Skewness và Kurtosis."], correct: "B" },
        { part: 1, text: "15. Một thang đo Likert 5 điểm thường được coi là thang đo khoảng trong phân tích thống kê, mặc dù về mặt lý thuyết nó là thang đo thứ bậc. Lý do chính là vì:", options: ["A. Các nhà tâm lý học không quan tâm đến lý thuyết thang đo.", "B. Khoảng cách giữa các lựa chọn được giả định là bằng nhau về mặt tâm lý và cho phép thực hiện các phép tính thống kê có ý nghĩa.", "C. Nó có điểm 0 tuyệt đối.", "D. Nó chỉ có hai giá trị."], correct: "B" },
        { part: 1, text: "16. Khi dữ liệu bị lệch (skewed) nghiêm trọng, chỉ số nào sau đây là đại diện tốt nhất cho xu hướng tập trung?", options: ["A. Số trung bình (Mean)", "B. Số trung vị (Median)", "C. Độ lệch chuẩn", "D. Hệ số tương quan"], correct: "B" },
        { part: 1, text: "17. Trong thống kê, mục đích chính của việc biến đổi dữ liệu (ví dụ: log, căn bậc hai) là gì?", options: ["A. Để làm cho dữ liệu trở nên phức tạp hơn.", "B. Để giảm số lượng biến trong phân tích.", "C. Để biến đổi phân phối dữ liệu về dạng gần với phân phối chuẩn hơn.", "D. Để tăng giá trị trung bình của dữ liệu."], correct: "C" },
        { part: 1, text: "18. \"Internal Validity\" (Độ giá trị nội tại) của một nghiên cứu đề cập đến:", options: ["A. Khả năng khái quát hóa kết quả nghiên cứu ra ngoài mẫu.", "B. Mức độ mà kết quả nghiên cứu phản ánh mối quan hệ nhân quả thực sự giữa biến độc lập và biến phụ thuộc.", "C. Độ tin cậy của thang đo được sử dụng.", "D. Sự phù hợp của phương pháp phân tích thống kê."], correct: "B" },
        { part: 1, text: "19. Gán ngẫu nhiên (random assignment) đối tượng vào các nhóm nghiên cứu giúp tăng cường:", options: ["A. External Validity", "B. Reliability", "C. Internal Validity", "D. Ecological Validity"], correct: "C" },
        { part: 1, text: "20. Một nhà nghiên cứu muốn mô tả mối quan hệ giữa hai biến định lượng. Loại biểu đồ nào là phù hợp nhất?", options: ["A. Biểu đồ tròn", "B. Biểu đồ thanh", "C. Biểu đồ tán xạ (Scatter plot)", "D. Biểu đồ hộp"], correct: "C" },

        // Phần 2: Cronbach (21-25)
        { part: 2, text: "21. Cronbach's Alpha được sử dụng để đo lường điều gì của một thang đo?", options: ["A. Độ giá trị nội dung", "B. Độ giá trị cấu trúc", "C. Độ tin cậy nhất quán nội bộ", "D. Độ ổn định qua thời gian"], correct: "C" },
        { part: 2, text: "22. Một thang đo có hệ số Cronbach's Alpha = 0.65. Dựa trên tài liệu, mức độ tin cậy này được đánh giá là:", options: ["A. Rất tốt", "B. Tốt", "C. Chấp nhận được", "D. Nghi ngờ/Không tốt"], correct: "D" },
        { part: 2, text: "23. Khi thực hiện kiểm định độ tin cậy Cronbach's Alpha trong Jamovi, nếu một item có giá trị \"Cronbach's α if item dropped\" cao hơn đáng kể so với Cronbach's α hiện tại của toàn thang đo, bạn nên làm gì?", options: ["A. Giữ nguyên item đó vì nó rất quan trọng.", "B. Cân nhắc loại bỏ item đó vì nó đang làm giảm độ tin cậy chung.", "C. Tăng cỡ mẫu lên.", "D. Chuyển sang dùng thang đo khác."], correct: "B" },
        { part: 2, text: "24. Để kiểm tra độ tin cậy của một thang đo gồm 10 item (câu hỏi) trong Jamovi, ta chọn mục nào sau đây?", options: ["A. T-Tests -> Paired T-Test", "B. ANOVA -> One-Way ANOVA", "C. Factor -> Reliability Analysis", "D. Regression -> Correlation Matrix"], correct: "C" },
        { part: 2, text: "25. Giả sử một thang đo có hệ số Cronbach's Alpha rất thấp (< 0.5). Nguyên nhân có thể là do:", options: ["A. Các item trong thang đo không đo lường cùng một khái niệm.", "B. Số lượng người tham gia quá lớn.", "C. Điểm trung bình của thang đo quá cao.", "D. Thang đo có độ giá trị rất tốt."], correct: "A" },

        // Phần 3: Suy luận & kiểm định giả thuyết (26-40)
        { part: 3, text: "26. Giả thuyết không (H0) trong một nghiên cứu thường được phát biểu như thế nào?", options: ["A. Có sự khác biệt giữa các nhóm.", "B. Có mối quan hệ giữa các biến.", "C. Không có sự khác biệt hoặc không có mối quan hệ.", "D. Kết quả nghiên cứu sẽ thành công."], correct: "C" },
        { part: 3, text: "27. Sai lầm loại I (Type I error) là:", options: ["A. Bác bỏ H0 khi H0 đúng.", "B. Không bác bỏ H0 khi H0 sai.", "C. Chấp nhận H1 khi H1 sai.", "D. Đặt mức ý nghĩa alpha quá thấp."], correct: "A" },
        { part: 3, text: "28. Một nghiên cứu kết luận rằng \"thuốc có tác dụng\" trong khi thực tế thuốc không có tác dụng. Đây là ví dụ của:", options: ["A. Sai lầm loại I (α)", "B. Sai lầm loại II (β)", "C. Quyết định đúng đắn", "D. Sức mạnh thống kê (Power)"], correct: "A" },
        { part: 3, text: "29. Trong một kiểm định giả thuyết, giá trị p (p-value) nhận được là 0.03. Với mức ý nghĩa α = 0.05, kết luận nào sau đây là đúng?", options: ["A. Bác bỏ H0, kết quả có ý nghĩa thống kê.", "B. Không bác bỏ H0, kết quả không có ý nghĩa thống kê.", "C. Chấp nhận H0.", "D. Xác suất H0 đúng là 3%."], correct: "A" },
        { part: 3, text: "30. Một kết quả \"có ý nghĩa thống kê\" (statistically significant) có nghĩa là:", options: ["A. Kết quả rất quan trọng trong thực tiễn lâm sàng.", "B. Kết quả này khó có thể xảy ra nếu giả thuyết không (H0) là đúng.", "C. Cỡ mẫu của nghiên cứu là đủ lớn.", "D. Không có sai sót nào trong quá trình nghiên cứu."], correct: "B" },
        { part: 3, text: "31. Khi đọc một bài báo khoa học, một nhà lâm sàng cần quan tâm nhất đến điều gì từ kết quả thống kê để đánh giá ý nghĩa thực tiễn của can thiệp?", options: ["A. Giá trị p nhỏ hơn 0.05.", "B. Kích thước hiệu ứng (effect size) và khoảng tin cậy (confidence interval).", "C. Giá trị của thống kê kiểm định (ví dụ: t, F).", "D. Bậc tự do (degree of freedom)."], correct: "B" },
        { part: 3, text: "32. Khoảng tin cậy 95% (95% CI) cho sự khác biệt trung bình giữa hai nhóm là [1.2, 3.5]. Điều này có nghĩa là:", options: ["A. Có 95% khả năng trung bình của nhóm 1 cao hơn nhóm 2 từ 1.2 đến 3.5 đơn vị.", "B. Nếu lặp lại nghiên cứu 100 lần, 95 lần khoảng tin cậy tính được sẽ chứa giá trị chênh lệch thực sự của tổng thể.", "C. Giá trị chênh lệch thực sự chắc chắn nằm trong khoảng 1.2 và 3.5.", "D. Không có sự khác biệt giữa hai nhóm vì khoảng không chứa 0."], correct: "B" },
        { part: 3, text: "33. Sức mạnh thống kê (Statistical Power) của một kiểm định là:", options: ["A. Xác suất bác bỏ H0 khi H0 đúng.", "B. Xác suất không bác bỏ H0 khi H0 sai.", "C. Xác suất bác bỏ H0 khi H0 sai.", "D. Xác suất không bác bỏ H0 khi H0 đúng."], correct: "C" },
        { part: 3, text: "34. Để tăng sức mạnh thống kê cho một nghiên cứu, cách làm nào sau đây là hiệu quả và phổ biến nhất?", options: ["A. Giảm mức ý nghĩa alpha (ví dụ từ 0.05 xuống 0.01).", "B. Tăng kích thước mẫu (sample size).", "C. Sử dụng kiểm định phi tham số thay vì tham số.", "D. Giảm độ lệch chuẩn của mẫu bằng cách chọn đối tượng đồng nhất."], correct: "B" },
        { part: 3, text: "35. Kiểm định một đuổi (one-tailed test) được sử dụng khi nào?", options: ["A. Khi nhà nghiên cứu không chắc chắn về chiều hướng của sự khác biệt.", "B. Khi nhà nghiên cứu muốn kiểm tra sự khác biệt theo cả hai hướng.", "C. Khi nhà nghiên cứu có cơ sở lý thuyết vững chắc để dự đoán chiều hướng của sự khác biệt (ví dụ: nhóm A sẽ cao hơn nhóm B).", "D. Khi cỡ mẫu nhỏ hơn 30."], correct: "C" },
        { part: 3, text: "36. Một nghiên cứu báo cáo kết quả t-test với Cohen's d = 0.8. Theo quy ước của Cohen, đây là kích thước hiệu ứng ở mức độ nào?", options: ["A. Nhỏ", "B. Trung bình", "C. Lớn", "D. Không đáng kể"], correct: "C" },
        { part: 3, text: "37. Theo tài liệu, một bài kiểm định được coi là có sức mạnh thống kê tốt thường cần đạt ngưỡng nào trở lên?", options: ["A. 50%", "B. 60%", "C. 80%", "D. 95%"], correct: "C" },
        { part: 3, text: "38. Nếu chúng ta giảm mức ý nghĩa alpha từ 0.05 xuống 0.01, điều gì sẽ xảy ra với sai lầm loại I và sai lầm loại II?", options: ["A. Giảm sai lầm loại I, tăng sai lầm loại II.", "B. Tăng sai lầm loại I, giảm sai lầm loại II.", "C. Cả hai loại sai lầm đều giảm.", "D. Cả hai loại sai lầm đều tăng."], correct: "A" },
        { part: 3, text: "39. Trong phân tích ANOVA, \"giá trị F lớn\" cho thấy điều gì?", options: ["A. Phương sai giữa các nhóm lớn hơn nhiều so với phương sai trong nội bộ nhóm.", "B. Phương sai trong nội bộ nhóm lớn hơn nhiều so với phương sai giữa các nhóm.", "C. Các nhóm có cùng giá trị trung bình.", "D. Cỡ mẫu không đủ lớn."], correct: "A" },
        { part: 3, text: "40. Một nghiên cứu có kết quả với p = 0.04. Nhưng khi xem xét kỹ, nhà nghiên cứu thấy rằng cỡ mẫu rất lớn (N=1000) và kích thước hiệu ứng (effect size) rất nhỏ. Kết luận nào là hợp lý nhất?", options: ["A. Đây là một phát hiện rất quan trọng vì nó có ý nghĩa thống kê.", "B. Mặc dù có ý nghĩa thống kê, nhưng kết quả có thể không có ý nghĩa thực tiễn do kích thước hiệu ứng nhỏ.", "C. Chắc chắn đã có sai lầm trong quá trình tính toán.", "D. Cần phải thực hiện thêm kiểm định phi tham số."], correct: "B" },

        // Phần 4: So sánh trung bình (41-60)
        { part: 4, text: "41. Để so sánh điểm trung bình về mức độ lo âu của một nhóm bệnh nhân trước và sau khi trị liệu, kiểm định nào sau đây là phù hợp nhất?", options: ["A. Independent samples t-test", "B. Paired samples t-test", "C. One-way ANOVA", "D. Chi-square test"], correct: "B" },
        { part: 4, text: "42. Một nghiên cứu muốn so sánh hiệu quả của hai liệu pháp tâm lý khác nhau trên hai nhóm bệnh nhân độc lập. Nhà nghiên cứu nên sử dụng kiểm định nào?", options: ["A. Paired samples t-test", "B. One-sample t-test", "C. Independent samples t-test", "D. Pearson correlation"], correct: "C" },
        { part: 4, text: "43. Trong Independent samples t-test, nếu kết quả kiểm định Levene (Levene's test) cho p < 0.05, điều này có nghĩa là gì và cần xử lý ra sao?", options: ["A. Phương sai hai nhóm bằng nhau → sử dụng kết quả Student's t-test.", "B. Phương sai hai nhóm KHÔNG bằng nhau → sử dụng kết quả Welch's t-test.", "C. Dữ liệu không có phân phối chuẩn → sử dụng Mann-Whitney U.", "D. Có điểm dị biệt trong dữ liệu → cần loại bỏ."], correct: "B" },
        { part: 4, text: "44. Giá trị bậc tự do (df) trong một independent samples t-test với hai nhóm có kích thước lần lượt là n1 = 25 và n2 = 25 (giả định phương sai bằng nhau) là bao nhiêu?", options: ["A. 24", "B. 48", "C. 49", "D. 50"], correct: "B" },
        { part: 4, text: "45. ANOVA một chiều (One-way ANOVA) được sử dụng để:", options: ["A. So sánh trung bình của hai nhóm.", "B. So sánh trung bình của ba nhóm trở lên trên một biến độc lập.", "C. So sánh phương sai của hai nhóm.", "D. Phân tích mối quan hệ giữa hai biến định tính."], correct: "B" },
        { part: 4, text: "46. Kết quả một One-way ANOVA cho thấy F(2, 45) = 5.12, p = 0.009. Với α = 0.05, kết luận nào sau đây là đúng?", options: ["A. Không có sự khác biệt nào giữa các nhóm.", "B. Có sự khác biệt có ý nghĩa thống kê giữa ít nhất hai nhóm.", "C. Tất cả các nhóm đều khác biệt nhau.", "D. Nhóm 1 khác nhóm 2, nhưng không khác nhóm 3."], correct: "B" },
        { part: 4, text: "47. Sau khi có kết quả ANOVA một chiều có ý nghĩa, bước tiếp theo cần làm là gì?", options: ["A. Kết luận ngay rằng các nhóm khác nhau.", "B. Thực hiện phân tích hậu nghiệm (Post-hoc test) để xác định cặp nhóm nào khác nhau.", "C. Chạy lại t-test cho từng cặp nhóm mà không cần hiệu chỉnh.", "D. Báo cáo kết quả là đã hoàn tất."], correct: "B" },
        { part: 4, text: "48. Nếu giả định phương sai đồng nhất (homogeneity of variance) trong One-way ANOVA bị vi phạm, kiểm định hậu nghiệm nào sau đây là phù hợp?", options: ["A. Tukey's HSD", "B. Bonferroni", "C. Games-Howell", "D. Scheffé"], correct: "C" },
        { part: 4, text: "49. Kiểm định Mauchly's Test of Sphericity được sử dụng trong loại ANOVA nào?", options: ["A. One-way Independent ANOVA", "B. Two-way Independent ANOVA", "C. One-way Repeated Measures ANOVA", "D. Tất cả các loại ANOVA"], correct: "C" },
        { part: 4, text: "50. Khi Mauchly's Test có p < 0.05, điều đó cho thấy giả định về tính tròn (sphericity) bị vi phạm. Giải pháp thường được sử dụng trong Jamovi là:", options: ["A. Sử dụng kết quả của kiểm định Tukey.", "B. Sử dụng hiệu chỉnh Greenhouse-Geisser hoặc Huynh-Feldt.", "C. Chuyển sang làm Independent t-test.", "D. Bỏ qua vì ANOVA rất mạnh với vi phạm này."], correct: "B" },
        { part: 4, text: "51. Trong Two-way ANOVA, \"hiệu ứng tương tác\" (interaction effect) có nghĩa là:", options: ["A. Cả hai biến độc lập đều có tác động riêng rẽ lên biến phụ thuộc.", "B. Tác động của một biến độc lập lên biến phụ thuộc thay đổi tùy theo mức độ của biến độc lập kia.", "C. Hai biến độc lập có tương quan với nhau.", "D. Các nhóm trong thí nghiệm có kích thước bằng nhau."], correct: "B" },
        { part: 4, text: "52. Một nghiên cứu 2x2 (giới tính: Nam, Nữ và loại trị liệu: CBT, Trị liệu thông thường) về hiệu quả giảm lo âu. Kết quả cho thấy hiệu ứng tương tác có ý nghĩa (p < 0.05). Điều này có thể được hiểu là:", options: ["A. Nam giới đáp ứng với cả hai loại trị liệu như nhau, nữ giới cũng vậy.", "B. CBT tốt hơn trị liệu thông thường cho cả nam và nữ.", "C. Sự khác biệt về hiệu quả giữa CBT và trị liệu thông thường là không giống nhau ở nam và nữ.", "D. Cần xem xét hiệu ứng chính của giới tính và loại trị liệu, bỏ qua hiệu ứng tương tác."], correct: "C" },
        { part: 4, text: "53. Một nghiên cứu sử dụng Mixed ANOVA (một yếu tố giữa nhóm, một yếu tố lặp). Giả thuyết chính của nghiên cứu là \"sự thay đổi theo thời gian là khác nhau giữa các nhóm\". Thành phần nào trong kết quả là quan trọng nhất để kiểm tra giả thuyết này?", options: ["A. Main effect của yếu tố thời gian.", "B. Main effect của yếu tố nhóm.", "C. Interaction effect giữa thời gian và nhóm.", "D. Kết quả kiểm định Levene."], correct: "C" },
        { part: 4, text: "54. Điểm khác biệt cơ bản giữa One-way Independent ANOVA và One-way Repeated Measures ANOVA là gì?", options: ["A. Số lượng biến phụ thuộc.", "B. Số lượng biến độc lập.", "C. Mối quan hệ giữa các đối tượng tham gia ở các nhóm/mức điểm khác nhau (độc lập vs. cùng một nhóm).", "D. Yêu cầu về phân phối chuẩn."], correct: "C" },
        { part: 4, text: "55. Trong Jamovi, để thực hiện phân tích Two-way Mixed ANOVA, ta chọn mục nào?", options: ["A. T-Tests -> Independent Samples T-Test", "B. ANOVA -> One-Way ANOVA", "C. ANOVA -> Repeated Measures ANOVA (và gán biến giữa nhóm vào ô Between Subjects Factors)", "D. Regression -> Linear Regression"], correct: "C" },
        { part: 4, text: "56. Xem xét tình huống: Nghiên cứu đánh giá 3 phương pháp giảng dạy (PP A, B, C) lên điểm số của sinh viên. Điểm số được đo ở 3 thời điểm (đầu kỳ, giữa kỳ, cuối kỳ). Nhà nghiên cứu muốn biết phương pháp nào giúp sinh viên tiến bộ nhanh nhất theo thời gian. Phân tích thống kê nào là phù hợp nhất?", options: ["A. Independent t-test cho từng thời điểm.", "B. One-way ANOVA cho từng thời điểm.", "C. Two-way Mixed ANOVA với PP là yếu tố giữa nhóm, Thời gian là yếu tố lặp.", "D. Repeated Measures ANOVA cho từng nhóm riêng lẻ."], correct: "C" },
        { part: 4, text: "57. Kiểm định phi tham số tương đương với Independent Samples t-test là:", options: ["A. Wilcoxon Signed-Rank Test", "B. Mann-Whitney U Test", "C. Friedman Test", "D. Kruskal-Wallis Test"], correct: "B" },
        { part: 4, text: "58. Kiểm định phi tham số tương đương với Paired Samples t-test là:", options: ["A. Wilcoxon Signed-Rank Test", "B. Mann-Whitney U Test", "C. Kruskal-Wallis Test", "D. Chi-square Test"], correct: "A" },
        { part: 4, text: "59. Kiểm định phi tham số tương đương với One-way Independent ANOVA là:", options: ["A. Friedman Test", "B. Mann-Whitney U Test", "C. Kruskal-Wallis Test", "D. Wilcoxon Signed-Rank Test"], correct: "C" },
        { part: 4, text: "60. Một nhà nghiên cứu muốn so sánh mức độ hài lòng (thang đo Likert 5 điểm, dạng thứ bậc) của sinh viên đối với ba phương pháp học khác nhau (các nhóm độc lập). Kiểm định thống kê nào là phù hợp nhất?", options: ["A. One-way ANOVA", "B. Kruskal-Wallis Test", "C. Repeated Measures ANOVA", "D. Friedman Test"], correct: "B" },

        // Phần 5: Chi‑square (61-65)
        { part: 5, text: "61. Kiểm định Chi-square (χ²) được sử dụng cho loại dữ liệu nào?", options: ["A. Dữ liệu định lượng (khoảng/tỷ lệ).", "B. Dữ liệu định tính (danh nghĩa/thứ bậc).", "C. Dữ liệu chuỗi thời gian.", "D. Dữ liệu từ các phép đo lặp."], correct: "B" },
        { part: 5, text: "62. Một nghiên cứu muốn tìm hiểu xem có mối liên hệ giữa giới tính (Nam, Nữ) và tình trạng hút thuốc (Hút, Không hút) hay không. Kiểm định nào phù hợp?", options: ["A. Independent t-test", "B. Paired t-test", "C. Pearson correlation", "D. Chi-square test of independence"], correct: "D" },
        { part: 5, text: "63. Khi thực hiện kiểm định Chi-square, một trong những điều kiện quan trọng để kết quả đáng tin cậy là:", options: ["A. Cỡ mẫu phải lớn hơn 100.", "B. Tần số kỳ vọng (expected count) trong mỗi ô của bảng chéo tối thiểu phải là 5.", "C. Dữ liệu phải có phân phối chuẩn.", "D. Phương sai các nhóm phải đồng nhất."], correct: "B" },
        { part: 5, text: "64. Một bảng chéo 2x2 cho kết quả Chi-square với p = 0.03. Với α = 0.05, kết luận nào đúng?", options: ["A. Có mối liên hệ có ý nghĩa thống kê giữa hai biến định tính.", "B. Không có mối liên hệ giữa hai biến.", "C. Giá trị trung bình của hai nhóm là khác nhau.", "D. Cần thực hiện kiểm định t-test để kiểm tra lại."], correct: "A" },
        { part: 5, text: "65. \"Kiểm định sự phù hợp\" (Goodness of fit test) của Chi-square dùng để:", options: ["A. Kiểm tra mối liên hệ giữa hai biến.", "B. So sánh tỷ lệ quan sát được của một biến với tỷ lệ kỳ vọng về mặt lý thuyết.", "C. So sánh trung bình của một mẫu với một giá trị chuẩn.", "D. Kiểm tra phân phối chuẩn của dữ liệu."], correct: "B" },

        // Phần 6: Tương quan & Hồi quy (66-90)
        { part: 6, text: "66. Hệ số tương quan Pearson (r) đo lường:", options: ["A. Mối quan hệ nhân quả giữa hai biến.", "B. Sự khác biệt trung bình giữa hai nhóm.", "C. Cường độ và chiều hướng của mối quan hệ tuyến tính giữa hai biến định lượng.", "D. Tỷ lệ phần trăm giữa các nhóm."], correct: "C" },
        { part: 6, text: "67. Hệ số tương quan r = -0.85 cho biết điều gì?", options: ["A. Mối tương quan thuận rất mạnh.", "B. Mối tương quan nghịch rất mạnh.", "C. Mối tương quan thuận yếu.", "D. Mối tương quan nghịch yếu."], correct: "B" },
        { part: 6, text: "68. Hệ số xác định R² (r²) có ý nghĩa là:", options: ["A. Độ dốc của đường hồi quy.", "B. Tỷ lệ phần trăm phương sai của biến này được giải thích bởi biến kia.", "C. Sai số chuẩn của ước lượng.", "D. Giá trị trung bình của tích hai biến."], correct: "B" },
        { part: 6, text: "69. Nếu ta biết r = 0.6 giữa thời gian ôn tập và điểm thi, thì bao nhiêu phần trăm phương sai của điểm thi được giải thích bởi thời gian ôn tập?", options: ["A. 60%", "B. 36%", "C. 40%", "D. 6%"], correct: "B" },
        { part: 6, text: "70. Khi kiểm tra mối tương quan trên biểu đồ tán xạ (scatter plot), các điểm tạo thành một đường thẳng đi xuống từ trái sang phải. Đó là dấu hiệu của:", options: ["A. Tương quan thuận mạnh.", "B. Tương quan nghịch mạnh.", "C. Không tương quan.", "D. Tương quan phi tuyến."], correct: "B" },
        { part: 6, text: "71. Khi nào nên sử dụng hệ số tương quan Spearman thay vì Pearson?", options: ["A. Khi cả hai biến đều là định lượng và có phân phối chuẩn.", "B. Khi một hoặc cả hai biến là thang đo thứ bậc, hoặc khi mối quan hệ là đơn điệu nhưng không tuyến tính.", "C. Khi muốn so sánh trung bình của hai nhóm.", "D. Khi muốn kiểm tra mối liên hệ giữa hai biến định tính."], correct: "B" },
        { part: 6, text: "72. Mục đích chính của phân tích hồi quy tuyến tính là:", options: ["A. Đo lường mức độ chặt chẽ của mối quan hệ giữa hai biến.", "B. Dự đoán giá trị của một biến (phụ thuộc) dựa trên giá trị của một hoặc nhiều biến khác (độc lập).", "C. So sánh trung bình nhiều nhóm.", "D. Phân tích cấu trúc tiềm ẩn của một thang đo."], correct: "B" },
        { part: 6, text: "73. Trong phương trình hồi quy tuyến tính đơn giản Y = a + bX, hệ số b (slope) cho biết:", options: ["A. Giá trị của Y khi X = 0.", "B. Khi X tăng lên 1 đơn vị thì Y thay đổi trung bình b đơn vị.", "C. Mức độ phù hợp của mô hình.", "D. Tương quan giữa X và Y."], correct: "B" },
        { part: 6, text: "74. Một nghiên cứu hồi quy cho thấy điểm trung bình môn Thống kê có thể được dự đoán từ điểm lo âu với phương trình: `Điểm thi = 8.5 - 0.3 * (Điểm lo âu)`. Điều này có nghĩa là:", options: ["A. Sinh viên có điểm lo âu càng cao thì điểm thi càng cao.", "B. Sinh viên có điểm lo âu bằng 0 thì điểm thi là 8.5.", "C. Khi điểm lo âu tăng 1 điểm, điểm thi dự đoán sẽ giảm 0.3 điểm.", "D. Cả B và C đều đúng."], correct: "D" },
        { part: 6, text: "75. Trong hồi quy đa biến, nếu một biến độc lập có chỉ số VIF (Variance Inflation Factor) lớn hơn 10, điều này cho thấy vấn đề gì?", options: ["A. Biến này không có ý nghĩa trong mô hình.", "B. Có hiện tượng đa cộng tuyến (multicollinearity) nghiêm trọng.", "C. Phần dư của mô hình không có phân phối chuẩn.", "D. Mô hình có hiện tượng phương sai thay đổi (heteroscedasticity)."], correct: "B" },
        { part: 6, text: "76. Giả định nào sau đây KHÔNG phải là giả định của hồi quy tuyến tính?", options: ["A. Mối quan hệ tuyến tính (Linearity) giữa biến độc lập và biến phụ thuộc.", "B. Phần dư có phân phối chuẩn (Normality of residuals).", "C. Phương sai của phần dư không đổi (Homoscedasticity).", "D. Các biến độc lập phải có tương quan chặt chẽ với nhau (High correlation among predictors)."], correct: "D" },
        { part: 6, text: "77. Kiểm định Durbin-Watson được sử dụng trong hồi quy để kiểm tra giả định gì?", options: ["A. Đa cộng tuyến.", "B. Tính độc lập của phần dư (tự tương quan).", "C. Phân phối chuẩn của phần dư.", "D. Tính tuyến tính."], correct: "B" },
        { part: 6, text: "78. Để kiểm tra giả định phần dư có phân phối chuẩn trong hồi quy trên Jamovi, ta có thể sử dụng:", options: ["A. Kiểm định Levene.", "B. Biểu đồ Residuals Plots kết hợp với kiểm định Shapiro-Wilk trên phần dư.", "C. Kiểm định Mauchly.", "D. Chỉ số VIF."], correct: "B" },
        { part: 6, text: "79. Trong hồi quy đa biến, hệ số hồi quy chuẩn hóa (Standardized coefficients - Beta) cho phép chúng ta:", options: ["A. So sánh trực tiếp mức độ ảnh hưởng của các biến độc lập có đơn vị đo khác nhau lên biến phụ thuộc.", "B. Tính toán giá trị dự đoán chính xác hơn.", "C. Loại bỏ các biến không quan trọng.", "D. Xác định ý nghĩa thống kê của từng hệ số."], correct: "A" },
        { part: 6, text: "80. Một mô hình hồi quy với R² hiệu chỉnh (Adjusted R²) = 0.45 có nghĩa là:", options: ["A. Mô hình dự đoán đúng 45% các trường hợp.", "B. Các biến độc lập trong mô hình giải thích được 45% sự biến thiên của biến phụ thuộc, sau khi đã hiệu chỉnh cho số lượng biến và cỡ mẫu.", "C. 45% phương sai của biến phụ thuộc không được giải thích.", "D. Mô hình này kém phù hợp hơn mô hình có R² hiệu chỉnh = 0.50."], correct: "B" },
        { part: 6, text: "81. Nếu đồ thị phân tán của phần dư (residuals) và giá trị dự đoán (predicted values) có dạng hình phễu (loe ra khi giá trị dự đoán tăng lên), điều này cho thấy vi phạm giả định nào?", options: ["A. Tính tuyến tính", "B. Phương sai không đổi (Homoscedasticity)", "C. Phân phối chuẩn của phần dư", "D. Độc lập của phần dư"], correct: "B" },
        { part: 6, text: "82. Hồi quy logistic được sử dụng khi:", options: ["A. Biến phụ thuộc là biến định lượng.", "B. Biến phụ thuộc là biến phân loại (ví dụ: nhị phân, thứ bậc).", "C. Mối quan hệ giữa các biến là phi tuyến.", "D. Có hiện tượng đa cộng tuyến."], correct: "B" },
        { part: 6, text: "83. Sự khác biệt chính giữa hồi quy tuyến tính (OLS) và hồi quy logistic là gì?", options: ["A. OLS dùng cho biến phụ thuộc liên tục, logistic dùng cho biến phụ thuộc phân loại.", "B. OLS dùng phương pháp bình phương tối thiểu, logistic dùng phương pháp hợp lý tối đa (Maximum Likelihood).", "C. Cả A và B đều đúng.", "D. OLS dễ thực hiện hơn trên Jamovi."], correct: "C" },
        { part: 6, text: "84. Trong hồi quy, nếu ta có một biến độc lập là biến định danh có 3 nhóm (ví dụ: \"Phương pháp trị liệu A, B, C\"), để đưa vào mô hình hồi quy, ta cần:", options: ["A. Sử dụng trực tiếp biến đó với 3 giá trị 1, 2, 3.", "B. Tạo ra hai biến giả (dummy variables).", "C. Bỏ qua biến đó vì không thể dùng trong hồi quy.", "D. Chuyển nó thành biến liên tục."], correct: "B" },
        { part: 6, text: "85. Một nhà nghiên cứu xây dựng mô hình hồi quy gồm 5 biến độc lập. Kết quả cho thấy mô hình tổng thể có ý nghĩa (p < 0.05) nhưng không có biến độc lập riêng lẻ nào có ý nghĩa (p > 0.05). Hiện tượng này có thể là dấu hiệu của:", options: ["A. Phương sai thay đổi.", "B. Đa cộng tuyến.", "C. Thiếu biến quan trọng.", "D. Cỡ mẫu quá nhỏ."], correct: "B" },
        { part: 6, text: "86. Trong hồi quy đa biến trên Jamovi, để kiểm tra giả định đa cộng tuyến, ta cần tick chọn ô nào?", options: ["A. Normality test", "B. Homogeneity test", "C. Collinearity statistics", "D. Durbin-Watson"], correct: "C" },
        { part: 6, text: "87. Một nghiên cứu muốn dự đoán điểm số \"Hài lòng với cuộc sống\" dựa trên 3 biến: Thu nhập, Số năm đi học, và Điểm lạc quan. Loại phân tích nào là phù hợp?", options: ["A. Tương quan Pearson.", "B. Hồi quy tuyến tính đa biến.", "C. Independent t-test.", "D. Chi-square."], correct: "B" },
        { part: 6, text: "88. Chỉ số nào đánh giá mức độ phù hợp tổng quát của mô hình hồi quy, cho biết tỷ lệ phần trăm biến thiên của biến phụ thuộc được giải thích bởi các biến độc lập?", options: ["A. Hệ số Beta", "B. Hệ số B (unstandardized)", "C. R² (R bình phương)", "D. Giá trị F"], correct: "C" },
        { part: 6, text: "89. Một kết quả hồi quy cho biết biến \"Lo âu\" có hệ số Beta = 0.45 và p = 0.001, biến \"Tự tin\" có hệ số Beta = 0.20 và p = 0.04. Có thể kết luận rằng:", options: ["A. \"Lo âu\" có ảnh hưởng mạnh hơn \"Tự tin\" lên biến phụ thuộc.", "B. \"Tự tin\" không có ảnh hưởng thực sự lên biến phụ thuộc.", "C. \"Lo âu\" và \"Tự tin\" không thể cùng nằm trong một mô hình.", "D. Cả hai biến đều không quan trọng."], correct: "A" },
        { part: 6, text: "90. Mô hình hồi quy có R² = 0.8 nhưng chỉ số VIF của một biến lên tới 15. Nhận định nào sau đây là đúng nhất?", options: ["A. Đây là một mô hình rất tốt vì R² cao.", "B. Mặc dù R² cao, mô hình có vấn đề về đa cộng tuyến nghiêm trọng, khiến các ước lượng hệ số không đáng tin cậy.", "C. Cần loại bỏ ngay lập tức biến có VIF cao, bất kể nó quan trọng thế nào.", "D. Không có vấn đề gì vì VIF không ảnh hưởng đến R²."], correct: "B" },

        // Phần 7: Tình huống tổng hợp (91-100)
        { part: 7, text: "91. Một nghiên cứu kiểm tra hiệu quả của một liệu pháp mới giảm trầm cảm. 60 bệnh nhân được chia ngẫu nhiên vào 2 nhóm: nhóm trị liệu và nhóm đối chứng. Mức độ trầm cảm được đo ở 4 thời điểm: trước, sau 1,3,6 tháng. Để kiểm tra liệu pháp có hiệu quả theo thời gian hay không và hiệu quả có khác nhau giữa hai nhóm, phân tích phù hợp nhất là:", options: ["A. Independent t-test từng thời điểm.", "B. Two-way Mixed ANOVA với Nhóm (giữa nhóm) và Thời gian (lặp).", "C. Repeated Measures ANOVA trên từng nhóm riêng biệt.", "D. Pearson correlation giữa điểm trầm cảm và thời gian."], correct: "B" },
        { part: 7, text: "92. Giả sử kết quả phân tích ở câu 91 cho thấy hiệu ứng tương tác (Nhóm * Thời gian) có p = 0.001 và biểu đồ cho thấy nhóm trị liệu giảm mạnh sau 3 tháng trong khi nhóm đối chứng gần như không đổi. Kết luận nào chính xác nhất?", options: ["A. Có sự khác biệt về điểm trầm cảm giữa các thời điểm.", "B. Liệu pháp có hiệu quả.", "C. Tác động của liệu pháp thay đổi theo thời gian và sự thay đổi này khác biệt có ý nghĩa so với nhóm đối chứng. Cụ thể, liệu pháp giúp giảm trầm cảm rõ rệt sau 3 tháng.", "D. Cần xem xét hiệu ứng chính của \"Nhóm\" vì nó quan trọng hơn."], correct: "C" },
        { part: 7, text: "93. Một bài báo cáo: \"Điểm hài lòng với cuộc sống của nhóm can thiệp (M = 7.5, SD = 1.2) cao hơn có ý nghĩa so với nhóm đối chứng (M = 6.8, SD = 1.5), t(78) = 2.45, p = 0.016, Cohen's d = 0.55.\" Con số \"78\" trong t(78) là gì?", options: ["A. Cỡ mẫu của nghiên cứu.", "B. Giá trị của thống kê t.", "C. Bậc tự do (degrees of freedom).", "D. Số lượng nhóm."], correct: "C" },
        { part: 7, text: "94. Trong cùng báo cáo trên (câu 93), chỉ số Cohen's d = 0.55 cho biết điều gì?", options: ["A. Xác suất xảy ra sai lầm loại I là 55%.", "B. Kích thước hiệu ứng (effect size) ở mức trung bình.", "C. Nhóm can thiệp có điểm số cao hơn 0.55 điểm.", "D. Mức độ tương quan giữa hai nhóm."], correct: "B" },
        { part: 7, text: "95. Một nghiên cứu muốn tìm hiểu các yếu tố ảnh hưởng đến \"Hành vi sử dụng chất gây nghiện\" (Có/Không). Các yếu tố dự kiến: Điểm trầm cảm, lo âu, áp lực bạn bè (liên tục), và Giới tính. Phân tích phù hợp nhất là?", options: ["A. Tương quan Pearson.", "B. Hồi quy tuyến tính đa biến.", "C. Hồi quy logistic nhị phân.", "D. Two-way ANOVA."], correct: "C" },
        { part: 7, text: "96. Kết quả kiểm định Levene trong Independent t-test có p = 0.20. Vậy ta sẽ sử dụng kết quả ở dòng nào để báo cáo?", options: ["A. Kết quả của kiểm định Student's t-test.", "B. Kết quả của kiểm định Welch's t-test.", "C. Cả hai đều giống nhau.", "D. Kết quả của kiểm định Mann-Whitney U."], correct: "A" },
        { part: 7, text: "97. Để kiểm tra độ tin cậy của một thang đo, sau khi chạy Cronbach's Alpha, bạn thấy có một item có tương quan biến-tổng (Corrected Item-Total Correlation) rất thấp và âm. Bạn nên làm gì?", options: ["A. Giữ nguyên item đó vì nó vẫn quan trọng về mặt nội dung.", "B. Xem xét loại bỏ item đó vì nó không đo lường cùng một khái niệm với các item khác.", "C. Đảo ngược thang điểm của item đó.", "D. Tăng cỡ mẫu lên gấp đôi."], correct: "B" },
        { part: 7, text: "98. Một nhà nghiên cứu thực hiện nhiều kiểm định t-test liên tiếp để so sánh nhiều cặp nhóm (ví dụ: so sánh 4 nhóm với nhau). Nguy cơ tiềm ẩn của việc làm này là gì?", options: ["A. Làm giảm sức mạnh thống kê.", "B. Làm tăng sai lầm loại I (lỗi alpha tích lũy).", "C. Không thể thực hiện được trên Jamovi.", "D. Dữ liệu sẽ tự động vi phạm giả định phân phối chuẩn."], correct: "B" },
        { part: 7, text: "99. Giải pháp cho vấn đề ở câu 98 là gì?", options: ["A. Không có giải pháp, cứ làm bình thường.", "B. Sử dụng ANOVA một chiều và kiểm định hậu nghiệm (post-hoc) có hiệu chỉnh (như Bonferroni, Tukey).", "C. Giảm mức ý nghĩa alpha xuống 0.001 cho tất cả các test.", "D. Chỉ so sánh hai cặp quan trọng nhất."], correct: "B" },
        { part: 7, text: "100. Một nghiên cứu cho thấy mối tương quan rất cao (r = 0.9) giữa số giờ xem TV và hành vi bạo lực ở trẻ em. Kết luận nào sau đây là an toàn và chính xác nhất?", options: ["A. Xem TV là nguyên nhân trực tiếp gây ra hành vi bạo lực ở trẻ em.", "B. Có một mối liên hệ chặt chẽ giữa hai biến, nhưng chưa thể khẳng định mối quan hệ nhân quả.", "C. Trẻ em xem TV nhiều là do bản tính bạo lực.", "D. Không nên cho trẻ em xem TV."], correct: "B" }
    ];

    // render từng phần
    const contentDiv = document.getElementById('content');
    let currentPart = 0;
    let html = '';
    for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        if (q.part !== currentPart) {
            if (currentPart !== 0) html += '</div>'; // đóng part cũ
            currentPart = q.part;
            html += `<div class="part"><h2><span>${currentPart}</span> ${tenPhan(currentPart)}</h2>`;
        }
        html += `
        <div class="question-card" id="cau${i}">
            <div class="q-text">${q.text}</div>
            <div class="options">
                <div class="option-item"><input type="radio" name="q${i}" value="A" id="q${i}a"><label for="q${i}a">${q.options[0]}</label></div>
                <div class="option-item"><input type="radio" name="q${i}" value="B" id="q${i}b"><label for="q${i}b">${q.options[1]}</label></div>
                <div class="option-item"><input type="radio" name="q${i}" value="C" id="q${i}c"><label for="q${i}c">${q.options[2]}</label></div>
                <div class="option-item"><input type="radio" name="q${i}" value="D" id="q${i}d"><label for="q${i}d">${q.options[3]}</label></div>
            </div>
            <button class="check-btn" onclick="kiemTra(${i}, '${q.correct}')">🔍 Kiểm tra</button>
            <div id="fb${i}" class="feedback"></div>
        </div>
        `;
    }
    html += '</div>'; // đóng part cuối
    contentDiv.innerHTML = html;

    // Hàm kiểm tra
    window.kiemTra = function(index, correct) {
        const radios = document.getElementsByName('q' + index);
        let selected = null;
        for (let r of radios) if (r.checked) { selected = r.value; break; }
        const fb = document.getElementById('fb' + index);
        if (!selected) {
            fb.className = 'feedback incorrect';
            fb.innerText = '⚠️ Bạn chưa chọn đáp án!';
            return;
        }
        if (selected === correct) {
            fb.className = 'feedback correct';
            fb.innerText = '✅ Chính xác! Đáp án ' + correct + ' đúng.';
        } else {
            fb.className = 'feedback incorrect';
            fb.innerText = '❌ Sai. Đáp án đúng là ' + correct + '.';
        }
    };

    // Bảng đáp án tổng hợp (dạng chuỗi các phần)
    const keyGrid = document.getElementById('keyGrid');
    const partKeys = [
        "Phần 1 (1-20): C,C,B,B,B, B,C,B,A,B, C,A,D,B,B, B,C,B,C,C",
        "Phần 2 (21-25): C,D,B,C,A",
        "Phần 3 (26-40): C,A,A,A,B, B,B,C,B,C, C,A,C,A,B",
        "Phần 4 (41-60): B,C,B,B,B, B,B,C,C,B, B,C,C,C,C, B,A,C,B",
        "Phần 5 (61-65): B,D,B,A,B",
        "Phần 6 (66-90): C,B,B,B,B, B,B,B,D,B, B,B,A,D,B, B,C,A,B,B, B,C,C,B,B",
        "Phần 7 (91-100): B,C,C,B,C, A,B,B,B,B"
    ];
    partKeys.forEach(p => {
        const div = document.createElement('div');
        div.className = 'key-item';
        div.textContent = p;
        keyGrid.appendChild(div);
    });

    function tenPhan(p) {
        const map = {1:"Nhập môn, thang đo & mô tả (1-20)", 2:"Độ tin cậy Cronbach (21-25)", 3:"Suy luận & kiểm định giả thuyết (26-40)", 4:"So sánh trung bình (41-60)", 5:"Chi‑square (61-65)", 6:"Tương quan & Hồi quy (66-90)", 7:"Tình huống tổng hợp (91-100)"};
        return map[p] || '';
    }
})();
</script>

</html>
